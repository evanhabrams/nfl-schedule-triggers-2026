<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Schedule Triggers — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pos: #22a559; --pos-hover: #1d8f4d; --pos-bg: #eaf5ee; --pos-text: #0c3d1d;
  --neg: #d44; --neg-hover: #b83a3a; --neg-bg: #fceaea; --neg-text: #621414;
  --text: #111827; --muted: #6b7280; --dim: #9ca3af;
  --border: #e5e7eb; --border-strong: #d1d5db; --bg: #f9fafb; --white: #fff;
  --cell-empty: #f3f4f6;
}
body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text); padding: 12px 16px 24px; max-width: 920px; margin: 0 auto; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 14px; }
.tab { font-size: 14px; font-weight: 600; color: var(--muted); padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.12s; user-select: none; background: transparent; border-left: 0; border-right: 0; border-top: 0; font-family: inherit; }
.tab:hover { color: var(--text); }
.tab.on[data-tab="pos"] { color: var(--pos); border-bottom-color: var(--pos); }
.tab.on[data-tab="neg"] { color: var(--neg); border-bottom-color: var(--neg); }
.tab-count { font-size: 11px; color: var(--dim); margin-left: 6px; font-weight: 500; }

/* Legend */
.legend { display: flex; gap: 14px; font-size: 12px; color: var(--muted); margin: 0 0 10px; align-items: center; flex-wrap: wrap; }
.legend-key { display: inline-flex; align-items: center; gap: 5px; }
.legend-swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }

/* Grid */
.grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.heatmap { display: grid; gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 6px; overflow: hidden; min-width: 700px; }
.h-cell { background: var(--white); padding: 5px 4px; font-size: 12px; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 32px; font-family: 'DM Mono', monospace; font-weight: 500; }
.h-team { background: var(--bg); justify-content: flex-start; padding: 6px 8px; gap: 7px; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.h-team img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
.h-team .nick { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-team .abbr { font-size: 12px; font-weight: 600; display: none; }
.h-hdr-team { background: var(--bg); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px; justify-content: flex-start; font-family: 'DM Sans', sans-serif; }
.h-hdr-trig { background: var(--bg); height: 110px; padding: 6px 0; overflow: hidden; }
.h-hdr-trig-inner { writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; font-size: 12px; font-weight: 500; padding: 0 2px; font-family: 'DM Sans', sans-serif; }
.h-hdr-trig.pos .h-hdr-trig-inner { color: var(--pos-text); background: var(--pos-bg); padding: 4px 6px; border-radius: 4px; }
.h-hdr-trig.neg .h-hdr-trig-inner { color: var(--neg-text); background: var(--neg-bg); padding: 4px 6px; border-radius: 4px; }
.h-hdr-total { background: var(--bg); font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; padding: 8px 4px; font-family: 'DM Sans', sans-serif; line-height: 1.25; text-align: center; }
.sortable { cursor: pointer; user-select: none; transition: background 0.1s; }
.sortable:hover { background: var(--border); }
.h-hdr-trig.sortable:hover { background: var(--border); }

/* Scroll hint — appears on mobile when grid overflows */
.scroll-hint { display: none; font-size: 11px; color: var(--muted); margin: 0 0 8px; align-items: center; gap: 5px; }
.scroll-hint svg { animation: nudge 1.4s ease-in-out infinite; }
@keyframes nudge { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(4px); } }

/* Cells */
.cell-0 { color: var(--dim); cursor: default; }
.cell-fire { cursor: pointer; font-weight: 600; transition: transform 0.08s; }
.cell-fire:hover { transform: scale(1.1); z-index: 5; position: relative; }
.cell-p-1 { background: #eaf5ee; color: var(--pos-text); }
.cell-p-2 { background: #b9dfc7; color: var(--pos-text); }
.cell-p-3 { background: #7cc491; color: #053316; }
.cell-n-1 { background: #fceaea; color: var(--neg-text); }
.cell-n-2 { background: #f4b8b8; color: var(--neg-text); }
.cell-n-3 { background: #ea7e7e; color: #441010; }
.cell-total-p { background: var(--pos); color: white; font-weight: 600; cursor: default; }
.cell-total-n { background: var(--neg); color: white; font-weight: 600; cursor: default; }

/* Expand button */
.expand-btn { display: block; width: 100%; margin-top: 10px; padding: 9px; background: var(--white); border: 1px dashed var(--border-strong); border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); transition: all 0.12s; }
.expand-btn:hover { color: var(--text); border-color: var(--text); }

/* Section labels */
.section-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin: 14px 0 6px; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 12px; }
.modal-bg.on { display: flex; }
.modal { background: var(--white); border-radius: 8px; max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px 22px; }
.modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.modal-close { background: transparent; border: 0; cursor: pointer; font-size: 22px; color: var(--muted); padding: 0; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 4px; line-height: 1; }
.modal-close:hover { background: var(--bg); color: var(--text); }
.modal-body { display: flex; flex-direction: column; gap: 10px; }

/* Game card (in modal) */
.game-card { padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
.gc-week { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 5px; }
.gc-matchup { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; margin-bottom: 7px; flex-wrap: wrap; }
.gc-matchup img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
.gc-vs { color: var(--muted); font-weight: 400; padding: 0 2px; }
.gc-triggers { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
.gc-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 11px; font-family: 'DM Sans', sans-serif; }
.gc-pill.pos { background: var(--pos-bg); color: var(--pos-text); }
.gc-pill.neg { background: var(--neg-bg); color: var(--neg-text); }
.gc-pill.active { outline: 1.5px solid currentColor; outline-offset: 1px; }
.gc-meta { font-size: 11px; color: var(--muted); }
.gc-meta .net { font-weight: 600; color: var(--text); }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; height: 200px; gap: 10px; color: var(--muted); font-size: 13px; }
.spin { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--pos); border-radius: 50%; animation: s 0.7s linear infinite; }
@keyframes s { to { transform: rotate(360deg); } }

/* Mobile — frozen team column + horizontal scroll for everything else */
@media (max-width: 600px) {
  body { padding: 10px 12px 20px; }
  .scroll-hint { display: flex; }

  /* Keep the grid at natural width so it overflows and scrolls */
  .heatmap { min-width: max-content; }

  /* Team column (header + cells) sticks to the left edge while the rest scrolls */
  .h-hdr-team, .h-team {
    position: sticky;
    left: 0;
    z-index: 10;
    box-shadow: 2px 0 4px -1px rgba(0,0,0,0.12);
  }
  .h-hdr-team { z-index: 11; }

  /* Swap full nickname for abbreviation */
  .h-team .nick { display: none; }
  .h-team .abbr { display: inline; }
  .h-team { padding: 5px 7px; gap: 6px; }
  .h-team img { width: 19px; height: 19px; }

  .h-hdr-trig { height: 92px; }
  .h-hdr-trig-inner { font-size: 11px; }
  .h-cell { font-size: 11px; min-height: 30px; }
}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab on" data-tab="pos">Positive triggers</button>
  <button class="tab" data-tab="neg">Negative triggers</button>
</div>

<div class="legend" id="legend"></div>

<div class="scroll-hint">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  Swipe to see all triggers and totals
</div>

<div id="content"><div class="loading"><div class="spin"></div>Loading 2026 trigger data…</div></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let data = null;
let currentTab = 'pos';
let showAll = { pos: false, neg: false };
// Sort state per tab: {key, dir}. key = 'team' | 'total' | 'games' | a trigger code. dir = 'desc' | 'asc'.
// Default null → falls back to tab-total descending.
let sortState = { pos: null, neg: null };

async function load() {
  try {
    const r = await fetch('./triggers.json?t=' + Date.now());
    data = await r.json();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:#d44">Failed to load triggers.json. Make sure it's in the same folder.</div>`;
  }
}

function trigsForTab(tab) {
  return data.triggers.filter(t => t.polarity === (tab === 'pos' ? 'P' : 'N'));
}
function teamTotal(team, tab) {
  return data.fires[team].totals[tab];
}

function isMobile() { return window.matchMedia('(max-width: 600px)').matches; }

function render() {
  renderLegend();
  const trigs = trigsForTab(currentTab);

  // ---- Sorting ----
  // Helper: fire count for a team on a given trigger code
  const fireCount = (team, code) => {
    const c = data.fires[team].byTrigger[code];
    return c ? c.count : 0;
  };
  const ss = sortState[currentTab];
  let allTeams = Object.keys(data.fires);
  if (!ss) {
    // Default: tab-total descending
    allTeams.sort((a, b) => teamTotal(b, currentTab) - teamTotal(a, currentTab));
  } else {
    const dir = ss.dir === 'asc' ? 1 : -1;
    if (ss.key === 'team') {
      allTeams.sort((a, b) => a.localeCompare(b) * dir);
    } else if (ss.key === 'total') {
      allTeams.sort((a, b) => (teamTotal(a, currentTab) - teamTotal(b, currentTab)) * dir);
    } else if (ss.key === 'games') {
      const g = t => currentTab === 'pos' ? data.fires[t].totals.posGames : data.fires[t].totals.negGames;
      allTeams.sort((a, b) => (g(a) - g(b)) * dir);
    } else {
      // a trigger code — sort by fire count, tiebreak on tab total
      allTeams.sort((a, b) => {
        const d = (fireCount(a, ss.key) - fireCount(b, ss.key)) * dir;
        return d !== 0 ? d : teamTotal(b, currentTab) - teamTotal(a, currentTab);
      });
    }
  }

  const initialN = isMobile() ? 5 : 16;
  const expanded = showAll[currentTab];
  const showTeams = expanded ? allTeams : allTeams.slice(0, initialN);
  const remaining = allTeams.length - showTeams.length;

  const ttlCellClass = currentTab === 'pos' ? 'cell-total-p' : 'cell-total-n';
  const hdrClass = currentTab === 'pos' ? 'pos' : 'neg';
  // Mobile: fixed widths so the grid overflows its container and scrolls horizontally,
  // with the team column frozen via position:sticky. Desktop: flexible columns that fill width.
  const cols = isMobile()
    ? `96px repeat(${trigs.length}, 44px) 52px 52px`
    : `184px repeat(${trigs.length}, minmax(36px, 1fr)) 58px 58px`;

  // Caret indicator for the active sort column
  const caret = (key) => {
    if (!ss || ss.key !== key) return '';
    return ss.dir === 'asc' ? ' \u25B2' : ' \u25BC';
  };

  let html = `<div class="grid-wrap"><div class="heatmap" style="grid-template-columns:${cols}">`;
  // Header row — all headers clickable to sort
  html += `<div class="h-cell h-hdr-team sortable" data-sort="team">Team${caret('team')}</div>`;
  for (const t of trigs) {
    html += `<div class="h-cell h-hdr-trig sortable ${hdrClass}" data-sort="${t.code}" title="${t.desc} — click to sort"><div class="h-hdr-trig-inner">${t.label}${caret(t.code)}</div></div>`;
  }
  html += `<div class="h-cell h-hdr-total sortable" data-sort="total"><span>Total<br>triggers${caret('total')}</span></div>`;
  html += `<div class="h-cell h-hdr-total sortable" data-sort="games"><span>Games w/<br>triggers${caret('games')}</span></div>`;

  // Team rows
  for (const team of showTeams) {
    const m = data.teams[team];
    const totals = data.fires[team].totals;
    const totTrig = currentTab === 'pos' ? totals.pos : totals.neg;
    const totGames = currentTab === 'pos' ? totals.posGames : totals.negGames;
    html += `<div class="h-cell h-team"><img src="${m.logo}" alt="${m.abbr}" onerror="this.style.display='none'"><span class="nick">${team}</span><span class="abbr">${m.abbr}</span></div>`;
    for (const t of trigs) {
      const cell = data.fires[team].byTrigger[t.code];
      const n = cell ? cell.count : 0;
      if (n === 0) {
        html += `<div class="h-cell cell-0">·</div>`;
      } else {
        const sign = currentTab === 'pos' ? 'p' : 'n';
        const bucket = n >= 3 ? 3 : n;
        html += `<div class="h-cell cell-fire cell-${sign}-${bucket}" data-team="${team}" data-code="${t.code}">${n}</div>`;
      }
    }
    html += `<div class="h-cell ${ttlCellClass}">${totTrig}</div>`;
    html += `<div class="h-cell ${ttlCellClass}" style="opacity:0.82">${totGames}</div>`;
  }
  html += `</div></div>`;

  // Expand button
  if (remaining > 0) {
    html += `<button class="expand-btn" id="expand-btn">Show all 32 teams (${remaining} more)</button>`;
  } else if (expanded && allTeams.length > initialN) {
    html += `<button class="expand-btn" id="expand-btn">Show top ${initialN} only</button>`;
  }

  document.getElementById('content').innerHTML = html;

  // Wire up cell clicks (open modal)
  document.querySelectorAll('.cell-fire').forEach(c => c.addEventListener('click', () => openModal(c.dataset.team, c.dataset.code)));
  // Wire up expand button
  const eb = document.getElementById('expand-btn');
  if (eb) eb.addEventListener('click', () => { showAll[currentTab] = !showAll[currentTab]; render(); });
  // Wire up sortable headers — click cycles: desc → asc → off (back to default)
  document.querySelectorAll('.sortable').forEach(h => h.addEventListener('click', () => {
    const key = h.dataset.sort;
    const cur = sortState[currentTab];
    if (!cur || cur.key !== key) {
      sortState[currentTab] = { key, dir: 'desc' };
    } else if (cur.dir === 'desc') {
      sortState[currentTab] = { key, dir: 'asc' };
    } else {
      sortState[currentTab] = null;  // third click resets to default
    }
    render();
  }));
}

function renderLegend() {
  const isPos = currentTab === 'pos';
  document.getElementById('legend').innerHTML = `
    <span class="legend-key"><span class="legend-swatch" style="background:${isPos?'#eaf5ee':'#fceaea'}"></span>1 fire</span>
    <span class="legend-key"><span class="legend-swatch" style="background:${isPos?'#b9dfc7':'#f4b8b8'}"></span>2 fires</span>
    <span class="legend-key"><span class="legend-swatch" style="background:${isPos?'#7cc491':'#ea7e7e'}"></span>3+ fires</span>
    <span style="color:#9ca3af; margin-left: 8px;">Click any filled cell to see the games</span>
  `;
}

function trigByCode(code) { return data.triggers.find(t => t.code === code); }

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function openModal(team, code) {
  const trig = trigByCode(code);
  const games = data.fires[team].byTrigger[code].games;
  document.getElementById('modal-title').textContent = `${team} — ${trig.label}`;
  document.getElementById('modal-subtitle').textContent = `${games.length} game${games.length === 1 ? '' : 's'} · ${trig.desc}`;

  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  for (const g of games) {
    const focal = data.teams[team];
    const opp = data.teams[g.opp];
    if (!opp) continue;
    const sep = g.han === 'A' ? '@' : g.han === 'N' ? 'vs (neutral)' : 'vs';
    const pills = g.triggers.map(c => {
      const t = trigByCode(c);
      const polClass = t.polarity === 'P' ? 'pos' : 'neg';
      return `<span class="gc-pill ${polClass}" title="${t.desc}">${t.label}</span>`;
    }).join('');
    const netStr = (g.net > 0 ? '+' : '') + g.net;
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="gc-week">Week ${g.week} · ${fmtDate(g.date)}</div>
      <div class="gc-matchup">
        <img src="${focal.logo}" alt="${focal.abbr}" onerror="this.style.display='none'"><span>${team}</span>
        <span class="gc-vs">${sep}</span>
        <img src="${opp.logo}" alt="${opp.abbr}" onerror="this.style.display='none'"><span>${g.opp}</span>
      </div>
      <div class="gc-triggers">${pills}</div>
      <div class="gc-meta">Spread: N/A · Net triggers: <span class="net">${netStr}</span></div>
    `;
    body.appendChild(card);
  }
  document.getElementById('modal-bg').classList.add('on');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('on'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target.id === 'modal-bg') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Tabs
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  currentTab = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x.dataset.tab === currentTab));
  render();
}));

// Re-render on resize (mobile breakpoint)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 200);
});

load();
</script>
</body>
</html>
